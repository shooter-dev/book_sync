name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - dev
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'data_doc/**'
      - '*.md'
      - '.github/**'
      - '.dockerignore'

env:
  AZURE_CONTAINER_REGISTRY: booksyncrepo.azurecr.io
  IMAGE_NAME: app-booksync
  RESOURCE_GROUP: vplatevoetRG
  CONTAINER_APP: app-booksync

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 1.5 configuration python
      - name: Configurer Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.12'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 2.5 test ping azure
      - name: Lint avec flake8
        run: |
          # arrêter le build s'il y a des erreurs de syntaxe Python ou des noms indéfinis
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero traite toutes les erreurs comme des avertissements
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Lancer les tests
        run: |
          pytest
          
      # 2. Connexion à Azure
      - name: Azure CLI login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Connexion à ACR
      - name: Docker login to ACR
        run: |
          az acr login --name booksyncrepo

      # 4. Build et Push de l'image Docker
      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $AZURE_CONTAINER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .
          docker push $AZURE_CONTAINER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 5. Mise à jour du Container App
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $AZURE_CONTAINER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
